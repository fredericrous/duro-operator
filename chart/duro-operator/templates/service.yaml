{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "duro-operator.fullname" . }}
  labels:
    {{- include "duro-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: api
      port: {{ .Values.api.port }}
      targetPort: api
      protocol: TCP
  selector:
    {{- include "duro-operator.selectorLabels" . | nindent 4 }}
{{- end }}
